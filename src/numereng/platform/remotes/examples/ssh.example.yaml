id: remote-gpu
label: Remote GPU Box
kind: ssh
ssh_config_host: remote-gpu
shell: posix
user_env: NUMERENG_REMOTE_GPU_USER
identity_file_env: NUMERENG_REMOTE_GPU_KEY
repo_root: /abs/path/to/numereng
store_root: /abs/path/to/numereng/.numereng
runner_cmd: uv run numereng
python_cmd: uv run python
enabled: true
tags:
  - gpu
  - ssh
