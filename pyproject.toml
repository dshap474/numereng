[project]
name = "numereng"
version = "0.1.0"
description = "Numerai workflow package for training, experiments, submissions, ensembles, HPO, cloud runs, and monitoring."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "boto3>=1.34",
    "fastapi>=0.115",
    "numpy>=2.0",
    "numerapi>=2.19",
    "pandas>=2.2",
    "pydantic>=2.8",
    "pyyaml>=6.0",
    "uvicorn>=0.30",
]

[project.urls]
Repository = "https://github.com/dshap474/numereng"
Issues = "https://github.com/dshap474/numereng/issues"
Documentation = "https://github.com/dshap474/numereng/tree/main/docs"

[project.optional-dependencies]
dev = [
    "httpx>=0.28",
    "lightgbm>=4.0",
    "mypy>=1.10",
    "numerai-tools>=0.5.3",
    "optuna>=4.0",
    "pandas-stubs>=2.2",
    "pyarrow>=15.0",
    "pytest>=8.0",
    "ruff>=0.6",
    "scipy>=1.12",
]
training = [
    "lightgbm>=4.0",
    "numerai-tools>=0.5.3",
    "optuna>=4.0",
    "pyarrow>=15.0",
]
mlops = [
    "mlflow>=2.17",
]

[project.scripts]
numereng = "numereng.cli:main"

[build-system]
requires = ["hatchling>=1.26.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/numereng"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"
addopts = "--strict-markers --tb=short"
markers = [
    "integration: Integration smoke tests for cross-boundary behavior",
    "e2e: End-to-end behavior tests",
    "slow: Long-running tests excluded from fast test gates",
]

[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = [".venv-test"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.11"
files = ["src", "tests"]
warn_unused_configs = true
strict = true

[[tool.mypy.overrides]]
module = [
    "boto3",
    "botocore",
    "botocore.*",
    "lightgbm",
    "numerai_tools",
    "numerai_tools.*",
    "optuna",
    "pandas",
    "pandas.*",
    "scipy",
    "scipy.*",
    "yaml",
]
ignore_missing_imports = true
