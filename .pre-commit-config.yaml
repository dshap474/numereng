minimum_pre_commit_version: "4.0.0"
default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args:
          - --maxkb=750
      - id: check-json
        exclude: ^\.codex/skills/numereng-experiment-ops/assets/training-config-template\.json$
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: ^docs/
      - id: mixed-line-ending
        args:
          - --fix=lf
      - id: trailing-whitespace
        exclude: ^docs/
  - repo: local
    hooks:
      - id: ruff-format-check
        name: ruff format check
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
      - id: oss-preflight
        name: oss preflight
        entry: make oss-preflight
        language: system
        pass_filenames: false
  - repo: local
    hooks:
      - id: numereng-fast-gate
        name: numereng fast gate
        entry: make test
        language: system
        pass_filenames: false
        stages:
          - pre-push
