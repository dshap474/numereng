name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # gitleaks-action scans the pushed commit range <first>^..<head>,
          # which needs history on both sides. Default shallow clone breaks
          # this on multi-commit pushes.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: taiki-e/install-action@just

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Run repo-local security checks
        run: just security

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
