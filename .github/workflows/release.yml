name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package-version: ${{ steps.package-version.outputs.value }}
      publish-target: ${{ steps.publish-target.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - uses: taiki-e/install-action@just

      - name: Resolve package version
        id: package-version
        run: |
          python - <<'PY' >>"${GITHUB_OUTPUT}"
          import tomllib
          from pathlib import Path

          payload = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(f"value={payload['project']['version']}")
          PY

      - name: Resolve publish target
        id: publish-target
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "value=testpypi" >>"${GITHUB_OUTPUT}"
          else
            echo "value=pypi" >>"${GITHUB_OUTPUT}"
          fi

      - name: Validate tag matches package version
        if: github.event_name == 'push'
        env:
          PACKAGE_VERSION: ${{ steps.package-version.outputs.value }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          test "${TAG_NAME}" = "v${PACKAGE_VERSION}" || {
            echo "tag_version_mismatch tag=${TAG_NAME} package=v${PACKAGE_VERSION}" >&2
            exit 1
          }

      - name: Validate manual release runs from main
        if: github.event_name == 'workflow_dispatch'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          test "${REF_NAME}" = "main" || {
            echo "workflow_dispatch_release_requires_main current_ref=${REF_NAME}" >&2
            exit 1
          }

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Run fast gate
        run: just test

      - name: Run install smoke
        run: ./scripts/release_smoke_install.sh

      - name: Build distributions
        run: uv build

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: numereng-dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    if: needs.build.outputs.publish-target == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/numereng
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: numereng-dist
          path: dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Publish to TestPyPI
        env:
          UV_PUBLISH_CHECK_URL: https://test.pypi.org/simple/
          UV_PUBLISH_URL: https://test.pypi.org/legacy/
        run: uv publish --trusted-publishing always

  publish-pypi:
    if: needs.build.outputs.publish-target == 'pypi'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/numereng
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: numereng-dist
          path: dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Publish to PyPI
        env:
          UV_PUBLISH_CHECK_URL: https://pypi.org/simple/
          UV_PUBLISH_URL: https://upload.pypi.org/legacy/
        run: uv publish --trusted-publishing always
